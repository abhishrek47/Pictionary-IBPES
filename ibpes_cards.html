<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IBPES 2005 · Stat Cards</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root { --accent: #fff; }

body {
  background: #080810;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 40px 20px 24px;
  background: radial-gradient(ellipse at 50% 0%, rgba(130,60,255,0.12) 0%, transparent 70%);
}
.header h1 {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: #fff;
}
.header p { font-size: 13px; color: #555; margin-top: 5px; }

/* ── PERSON SELECTOR ── */
.selector {
  display: flex;
  gap: 8px;
  padding: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-bottom: 1px solid #111;
}
.selector::-webkit-scrollbar { display: none; }
.sel-btn {
  flex-shrink: 0;
  width: 48px; height: 48px;
  border-radius: 14px;
  border: 2px solid #1a1a2e;
  background: #0e0e1a;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.sel-btn.active { border-width: 2px; transform: scale(1.1); }

/* ── CARD STAGE ── */
.stage {
  padding: 20px 16px 40px;
  display: flex;
  justify-content: center;
}

/* ── THE CARD ── */
.card {
  width: 100%;
  max-width: 380px;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  background: var(--card-bg);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
  animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn {
  from { opacity:0; transform: scale(0.88) translateY(20px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

/* Noise texture overlay */
.card::before {
  content:'';
  position:absolute; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4;
  z-index: 1;
  pointer-events: none;
}

.card-inner { position: relative; z-index: 2; }

/* TOP BAND */
.card-top {
  padding: 28px 24px 20px;
  position: relative;
  overflow: hidden;
}
.card-top::after {
  content:'';
  position:absolute;
  top:-60px; right:-60px;
  width:180px; height:180px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
}

.card-season {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 16px;
}

.card-avatar-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 14px;
}
.card-avatar {
  width: 68px; height: 68px;
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 22px;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.15);
}
.card-name-block { flex: 1; }
.card-name {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.5px;
  line-height: 1.1;
  color: #fff;
}
.card-archetype {
  font-size: 13px;
  font-weight: 700;
  margin-top: 5px;
  line-height: 1.3;
}

/* DIVIDER */
.divider {
  height: 1px;
  background: rgba(255,255,255,0.07);
  margin: 0 24px;
}

/* STATS GRID */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: rgba(255,255,255,0.07);
  margin: 0;
}
.stat-cell {
  background: var(--card-bg);
  padding: 16px 20px;
}
.stat-val {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1;
}
.stat-lbl {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* QUOTE */
.card-quote {
  padding: 18px 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.quote-text {
  font-size: 13px;
  font-style: italic;
  color: rgba(255,255,255,0.65);
  line-height: 1.55;
}
.quote-text::before { content: '" '; color: rgba(255,255,255,0.2); font-size: 20px; }
.quote-text::after  { content: ' "'; color: rgba(255,255,255,0.2); font-size: 20px; }

/* FOOTER */
.card-footer {
  padding: 14px 24px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.card-footer-left {
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.5px;
}
.rank-badge {
  font-size: 11px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5);
}

/* SHARE HINT */
.share-hint {
  text-align: center;
  padding: 0 0 32px;
  font-size: 12px;
  color: #333;
}

/* TRAIT PILLS */
.trait-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 14px 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.trait-pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 99px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5);
}
</style>

let active = 0;

function render(i) {
  active = i;
  const p = PEOPLE[i];

  // Update selector
  document.querySelectorAll('.sel-btn').forEach((b, j) => {
    b.classList.toggle('active', j === i);
    b.style.borderColor = j === i ? p.accentColor : '#1a1a2e';
    b.style.color = j === i ? p.accentColor : '#444';
    b.style.background = j === i ? p.avatarBg : '#0e0e1a';
  });

  // Scroll selector
  const btn = document.querySelector('.sel-btn.active');
  if(btn) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  const stage = document.getElementById('stage');
  stage.innerHTML = `
    <div class="card" style="background:${p.bg}">
      <div class="card-inner">

        <div class="card-top">
          <div class="card-season">IBPES 2005 · BOND BEYOND BENCHES · APR 2026</div>
          <div class="card-avatar-row">
            <div class="card-avatar" style="background:${p.avatarBg};color:${p.accentColor}">${p.init}</div>
            <div class="card-name-block">
              <div class="card-name">${p.name}</div>
              <div class="card-archetype" style="color:${p.accentColor}">${p.archetype}</div>
            </div>
          </div>
        </div>

        <div class="stats-grid">
          ${p.stats.map(s => `
            <div class="stat-cell">
              <div class="stat-val" style="color:${p.accentColor}">${s.val}</div>
              <div class="stat-lbl">${s.lbl}</div>
            </div>
          `).join('')}
        </div>

        <div class="trait-row">
          ${p.traits.map(t => `<span class="trait-pill">${t}</span>`).join('')}
        </div>

        <div class="card-quote">
          <div class="quote-text">${p.quote}</div>
        </div>

        <div class="card-footer">
          <div class="card-footer-left">IBPES 2005 · Class of 2005</div>
          <div class="rank-badge" style="border-color:${p.accentColor}33;color:${p.accentColor}">${p.rank}</div>
        </div>

      </div>
    </div>
  `;
}

// Build selector
const sel = document.getElementById('selector');
PEOPLE.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'sel-btn';
  btn.textContent = p.init;
  btn.onclick = () => render(i);
  btn.style.color = '#444';
  sel.appendChild(btn);
});

// Swipe support on card
let tx = 0;
document.getElementById('stage').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.getElementById('stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if(Math.abs(dx) > 60) {
    if(dx < 0 && active < PEOPLE.length-1) render(active+1);
    if(dx > 0 && active > 0) render(active-1);
  }
});

// Keyboard
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight' && active<PEOPLE.length-1) render(active+1);
  if(e.key==='ArrowLeft'  && active>0) render(active-1);
});

render(0);
