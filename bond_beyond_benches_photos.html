<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bond Beyond Benches — The Moments 📸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Caveat:wght@600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

:root {
  --green: #25D366;
  --green-bubble: #005c4b;
  --white-bubble: #202c33;
  --bg: #0b1014;
  --card-bg: #111b21;
  --border: rgba(255,255,255,0.06);
  --text: #e9edef;
  --text-dim: #8696a0;
  --radius: 18px;
}

body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* ─── HERO ─── */
.hero {
  padding: 56px 24px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 50%, rgba(37,211,102,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 50%, rgba(155,89,182,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.hero-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(37,211,102,0.1);
  border: 1px solid rgba(37,211,102,0.25);
  color: var(--green);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
}
.hero-chip::before { content: '●'; font-size: 8px; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.hero h1 {
  font-family: 'Caveat', cursive;
  font-size: clamp(40px, 7vw, 78px);
  font-weight: 700;
  color: #fff;
  line-height: 1;
  margin-bottom: 12px;
}
.hero h1 em { color: var(--green); font-style: normal; }
.hero p { color: var(--text-dim); font-size: 14px; max-width: 480px; margin: 0 auto; }

/* ─── FILTER BAR ─── */
.sticky-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(11,16,20,0.94);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.sticky-bar::-webkit-scrollbar { display: none; }
.f-btn {
  flex-shrink: 0;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim);
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  font-family: 'Inter', sans-serif;
}
.f-btn:hover { background: rgba(37,211,102,0.08); border-color: rgba(37,211,102,0.3); color: var(--green); }
.f-btn.on { background: rgba(37,211,102,0.14); border-color: var(--green); color: var(--green); }
.count-pill {
  font-size: 10px;
  background: rgba(255,255,255,0.08);
  padding: 1px 5px;
  border-radius: 8px;
  margin-left: 4px;
  color: var(--text-dim);
}

/* ─── MASONRY WALL ─── */
.wall {
  columns: 3 300px;
  column-gap: 14px;
  padding: 20px 16px 80px;
  max-width: 1360px;
  margin: 0 auto;
}

/* ─── CHAT CARD ─── */
.chat-card {
  break-inside: avoid;
  display: inline-block;
  width: 100%;
  margin-bottom: 14px;
  background: var(--card-bg);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(.34,1.4,.64,1), box-shadow 0.25s;
  cursor: pointer;
}
.chat-card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  border-color: rgba(255,255,255,0.12);
}
.chat-card.gone { display: none; }

/* Card header */
.card-header {
  padding: 12px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.card-cat {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 10px;
}
.card-date { font-size: 10px; color: var(--text-dim); }

/* Chat title */
.card-title {
  font-family: 'Caveat', cursive;
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  padding: 10px 14px 4px;
  line-height: 1.2;
}

/* Chat body */
.chat-body { padding: 6px 10px 10px; }

/* Message bubbles */
.bubble-row {
  display: flex;
  margin-bottom: 4px;
  gap: 6px;
}
.bubble-row.them { justify-content: flex-start; }
.bubble-row.me   { justify-content: flex-end; }

.bubble {
  max-width: 82%;
  padding: 7px 10px;
  border-radius: 12px;
  font-size: 12px;
  line-height: 1.4;
  position: relative;
  word-break: break-word;
}
.bubble.them {
  background: var(--white-bubble);
  color: var(--text);
  border-bottom-left-radius: 3px;
}
.bubble.me {
  background: var(--green-bubble);
  color: var(--text);
  border-bottom-right-radius: 3px;
}
.bubble-sender {
  font-size: 10px;
  font-weight: 700;
  margin-bottom: 3px;
}
.bubble-text { line-height: 1.4; }
.bubble-time {
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  text-align: right;
  margin-top: 2px;
}

/* Divider "then this happened" */
.drop-label {
  text-align: center;
  padding: 8px 0 4px;
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.drop-label::before, .drop-label::after {
  content:''; flex:1; height:1px; background:rgba(255,255,255,0.07);
}

/* Photo bubble */
.photo-bubble {
  background: var(--white-bubble);
  border-radius: 12px;
  border-bottom-left-radius: 3px;
  overflow: hidden;
  margin-bottom: 2px;
}
.photo-bubble img {
  width: 100%;
  display: block;
  max-height: 320px;
  object-fit: cover;
}
.photo-caption {
  font-size: 11px;
  color: var(--text-dim);
  padding: 5px 8px 2px;
  font-style: italic;
}
.photo-sender-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 8px 6px;
}
.photo-sender { font-size: 10px; font-weight: 700; }
.photo-time { font-size: 9px; color: rgba(255,255,255,0.3); }

/* Reaction divider */
.rxn-label {
  text-align: center;
  padding: 6px 0 4px;
  font-size: 10px;
  color: rgba(37,211,102,0.5);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.rxn-label::before, .rxn-label::after {
  content:''; flex:1; height:1px; background:rgba(37,211,102,0.08);
}

/* ─── LIGHTBOX ─── */
.lb {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.93);
  z-index: 999;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(10px);
}
.lb.open { display: flex; }
.lb-box {
  background: var(--card-bg);
  border-radius: 20px;
  max-width: 520px;
  width: 100%;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  position: relative;
}
.lb-img { width: 100%; display: block; max-height: 65vh; object-fit: contain; background: #000; }
.lb-body { padding: 16px 20px 20px; }
.lb-title { font-family:'Caveat',cursive; font-size: 22px; color: #fff; margin-bottom: 6px; }
.lb-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
.lb-rxn { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; font-size: 13px; }
.lb-rxn strong { font-weight: 700; }
.lb-close {
  position: absolute; top: 12px; right: 12px;
  background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
  color: #fff; width: 32px; height: 32px; border-radius: 50%;
  font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.lb-close:hover { background: rgba(255,255,255,0.1); }

/* Footer */
.footer {
  text-align: center;
  padding: 32px 20px;
  color: #2a3a30;
  font-size: 12px;
  border-top: 1px solid rgba(255,255,255,0.04);
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-chip">Live from the group chat</div>
  <h1>Bond Beyond <em>Benches</em></h1>
  <p>20 moments from 3 weeks of beautiful chaos. The setup, the drop, the reactions — exactly as it happened.</p>
</div>

<div class="sticky-bar" id="filterBar">

  <button class="f-btn" data-f="life">📸 Real Life</button>
  <button class="f-btn" data-f="data">📊 Data Nerd</button>
  <button class="f-btn" data-f="create">🎨 Creative</button>
</div>

<div class="wall" id="wall"></div>

<div class="lb" id="lb">
  <div class="lb-box">
    <button class="lb-close" id="lbX">✕</button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-body">
      <div class="lb-title" id="lbTitle"></div>
      <div class="lb-meta" id="lbMeta"></div>
      <div id="lbRxns"></div>
    </div>
  </div>
</div>

// Sender color map
const SENDER_COLORS = {
  'Mihir': '#f39c12', 'Neha': '#e91e8c', 'Abhishek': '#3498db',
  'Abhi': '#1abc9c', 'Urvesh': '#8e44ad', 'Ashok': '#e74c3c',
  'Jeno': '#27ae60', 'Nirali': '#9b59b6', 'Lokhandwala': '#e67e22',
  'Harshil': '#16a085', 'Darshita': '#d35400', 'Madhuri': '#2980b9',
  'Pranali': '#8e44ad', 'Dr.': '#e91e8c', 'Salesmannap': '#7f8c8d',
  'Tanvi': '#e67e22', 'Nisha': '#c0392b', 'Chintan': '#27ae60',
  'Tejasvi': '#f1c40f', 'HITENDRA': '#e74c3c', 'Snehal': '#16a085',
};
function senderColor(name) {
  const first = name.split(' ')[0];
  return SENDER_COLORS[first] || '#8696a0';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildCard(p) {
  const div = document.createElement('div');
  div.className = 'chat-card';
  div.dataset.cat = p.cat;

  // Header
  const catBg = p.color + '20';
  const header = `<div class="card-header">
    <span class="card-cat" style="background:${catBg};color:${p.color}">${esc(p.cat_label)}</span>
    <span class="card-date">${esc(p.date)}</span>
  </div>`;

  // Title
  const title = `<div class="card-title">${esc(p.title)}</div>`;

  // Chat body
  let chat = '<div class="chat-body">';

  // BEFORE bubbles (setup)
  if (p.before && p.before.length) {
    p.before.forEach(b => {
      const isMe = b.sender.startsWith('Abhishek');
      const side = isMe ? 'me' : 'them';
      const col = senderColor(b.sender);
      chat += `<div class="bubble-row ${side}">
        <div class="bubble ${side}">
          ${!isMe ? `<div class="bubble-sender" style="color:${col}">${esc(b.sender)}</div>` : ''}
          <div class="bubble-text">${esc(b.text)}</div>
        </div>
      </div>`;
    });
  }

  // Drop label
  chat += `<div class="drop-label">then this dropped</div>`;

  // Photo bubble
  const capHtml = p.caption ? `<div class="photo-caption">"${esc(p.caption)}"</div>` : '';
  const sCol = senderColor(p.sender);
  chat += `<div class="photo-bubble">
    <img src="data:image/jpeg;base64,${p.b64}" alt="${esc(p.title)}" loading="lazy">
    ${capHtml}
    <div class="photo-sender-row">
      <span class="photo-sender" style="color:${sCol}">${esc(p.sender.split(' ')[0])}</span>
      <span class="photo-time">${esc(p.time)}</span>
    </div>
  </div>`;

  // Reaction divider
  if (p.after && p.after.length) {
    chat += `<div class="rxn-label">the group reacted</div>`;
    p.after.slice(0, 3).forEach(a => {
      const isMe = a.sender.startsWith('Abhishek');
      const side = isMe ? 'me' : 'them';
      const col = senderColor(a.sender);
      chat += `<div class="bubble-row ${side}">
        <div class="bubble ${side}">
          ${!isMe ? `<div class="bubble-sender" style="color:${col}">${esc(a.sender)}</div>` : ''}
          <div class="bubble-text">${esc(a.text)}</div>
        </div>
      </div>`;
    });
  }

  chat += '</div>';

  div.innerHTML = header + title + chat;
  div.addEventListener('click', () => openLb(p));
  return div;
}

const wall = document.getElementById('wall');
PHOTOS.forEach(p => wall.appendChild(buildCard(p)));

// Lightbox
function openLb(p) {
  document.getElementById('lbImg').src = `data:image/jpeg;base64,${p.b64}`;
  document.getElementById('lbTitle').textContent = p.title;
  document.getElementById('lbMeta').textContent = `${p.sender} · ${p.date} · ${p.time}${p.caption ? ' · "' + p.caption + '"' : ''}`;
  const rxnEl = document.getElementById('lbRxns');
  rxnEl.innerHTML = (p.after||[]).slice(0,4).map(a =>
    `<div class="lb-rxn" style="border-left:2px solid ${senderColor(a.sender)}"><strong style="color:${senderColor(a.sender)}">${esc(a.sender)}:</strong> ${esc(a.text)}</div>`
  ).join('');
  document.getElementById('lb').classList.add('open');
}
document.getElementById('lbX').addEventListener('click', () => document.getElementById('lb').classList.remove('open'));
document.getElementById('lb').addEventListener('click', e => { if(e.target === document.getElementById('lb')) document.getElementById('lb').classList.remove('open'); });

// Filters
document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const f = btn.dataset.f;
    document.querySelectorAll('.chat-card').forEach(c => {
      c.classList.toggle('gone', f !== 'all' && c.dataset.cat !== f);
    });
  });
});
</script>
